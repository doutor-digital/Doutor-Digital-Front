# SPA (React/Vite) + PWA — espelha o comportamento do vercel.json.
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Healthcheck do container — usado pelo rolling update do Swarm para saber
    # que a versão nova subiu antes de matar a antiga (deploy sem downtime).
    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    # Assets com hash no nome → cache longo e imutável.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Service worker / manifest → nunca cachear (PWA atualiza na hora).
    location = /sw.js {
        add_header Cache-Control "public, max-age=0, must-revalidate";
        add_header Service-Worker-Allowed "/";
    }
    location = /registerSW.js { add_header Cache-Control "public, max-age=0, must-revalidate"; }
    location = /manifest.webmanifest { add_header Cache-Control "public, max-age=0, must-revalidate"; }
    location = /index.html { add_header Cache-Control "public, max-age=0, must-revalidate"; }

    # Fallback SPA: qualquer rota desconhecida cai no index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
