<!doctype html>
<html lang="pt-BR" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, viewport-fit=cover" />

    <title>Doutor Digital - Consultoria</title>
    <meta name="description" content="Painel de leads, contatos e atendimentos da Doutor Digital." />

    <!-- Tema / status bar -->
    <meta name="theme-color" content="#0a0a0d" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#f6f9fd" media="(prefers-color-scheme: light)" />

    <!-- Pré-conexão para a origem do logo (performance) -->
    <link rel="preconnect" href="https://i.postimg.cc" crossorigin />
    <link rel="dns-prefetch" href="https://i.postimg.cc" />

    <!-- Fonte PT Sans self-hosted (carrega no mobile mesmo offline; sem CDN) -->
    <link
      rel="preload"
      href="/fonts/ptsans-400.woff2"
      as="font"
      type="font/woff2"
      crossorigin
    />
    <link
      rel="preload"
      href="/fonts/ptsans-700.woff2"
      as="font"
      type="font/woff2"
      crossorigin
    />

    <!-- Flaticon UIcons (Regular Rounded) — usados na dashboard -->
    <link rel="preconnect" href="https://cdn-uicons.flaticon.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://cdn-uicons.flaticon.com/2.4.2/uicons-regular-rounded/css/uicons-regular-rounded.css"
    />
    <link
      rel="stylesheet"
      href="https://cdn-uicons.flaticon.com/2.4.2/uicons-solid-rounded/css/uicons-solid-rounded.css"
    />

    <!-- Ícones -->
    <link rel="icon" type="image/png" href="/icon-192.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <!-- PWA iOS -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Doutor Digital" />

    <!-- PWA Windows / Android -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="application-name" content="Doutor Digital" />

    <!-- Desabilita formatação automática de telefone no iOS -->
    <meta name="format-detection" content="telephone=no" />
  </head>
  <body class="bg-slate-950 text-slate-100 antialiased">
    <div id="root">
      <!-- Boot splash: fundo branco instantâneo (antes do React montar) — evita flash escuro -->
      <div style="position:fixed;inset:0;z-index:90;display:flex;align-items:center;justify-content:center;background:#ffffff;">
        <img src="/logo-official.png" alt="Doutor Digital" style="width:170px;max-width:55vw;opacity:0;animation:bootLogo .6s ease-out .05s forwards;" />
      </div>
      <style>@keyframes bootLogo{to{opacity:1}}</style>
    </div>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
