name: deploy-web

on:
  push:
    branches: [main]
    paths-ignore:
      - "**/*.md"
  workflow_dispatch:

concurrency:
  group: deploy-web
  cancel-in-progress: false

env:
  IMAGE_NAME: doutordigital-web
  STACK_NAME: ddweb
  REMOTE_DIR: /opt/doutordigital/web

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      tag: ${{ github.sha }}
    steps:
      - uses: actions/checkout@v4

      - name: Owner em minúsculas (GHCR exige lowercase)
        id: owner
        run: echo "lc=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          # Vite "assa" a URL da API em build-time → vem de uma Variable do repo.
          build-args: |
            VITE_API_BASE_URL=${{ vars.VITE_API_BASE_URL }}
          tags: |
            ghcr.io/${{ steps.owner.outputs.lc }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
            ghcr.io/${{ steps.owner.outputs.lc }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Copia o docker-compose.yml para a VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: docker-compose.yml
          target: ${{ env.REMOTE_DIR }}

      - name: Rolling update sem downtime
        uses: appleboy/ssh-action@v1.2.0
        env:
          IMAGE_TAG: ${{ needs.build.outputs.tag }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: IMAGE_TAG
          script_stop: true
          script: |
            set -euo pipefail
            cd ${{ env.REMOTE_DIR }}

            echo "${{ secrets.GHCR_PULL_TOKEN }}" \
              | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

            set -a
            . ./.env
            set +a
            export IMAGE_TAG

            echo "→ deployando ${IMAGE_TAG}"
            docker stack deploy \
              -c docker-compose.yml \
              --with-registry-auth \
              --prune \
              ${{ env.STACK_NAME }}

            SVC=${{ env.STACK_NAME }}_web
            for _ in $(seq 1 40); do
              STATE=$(docker service inspect "$SVC" \
                --format '{{if .UpdateStatus}}{{.UpdateStatus.State}}{{else}}completed{{end}}')
              case "$STATE" in
                completed)
                  echo "✓ rollout concluído"
                  exit 0 ;;
                rollback_started|rollback_completed|paused|rollback_paused)
                  echo "✗ rollout falhou (estado: $STATE) — Swarm reverteu"
                  docker service ps "$SVC" --no-trunc | head -20
                  exit 1 ;;
              esac
              sleep 5
            done

            echo "✗ timeout esperando a convergência"
            docker service ps "$SVC" --no-trunc | head -20
            exit 1

      - name: Smoke test público
        run: |
          for i in $(seq 1 10); do
            CODE=$(curl -s -o /dev/null -w "%{http_code}" \
              "https://${{ vars.WEB_DOMAIN }}/healthz" --max-time 10 || echo 000)
            [ "$CODE" = "200" ] && { echo "✓ /healthz respondeu 200"; exit 0; }
            echo "tentativa $i: HTTP $CODE"
            sleep 6
          done
          echo "✗ /healthz não respondeu 200"
          exit 1
