name: deploy-web

# O projeto vive em Front-End/, mas o Actions só lê workflows da raiz do repo.
on:
  push:
    branches: [main]
    # GitHub não aceita paths + paths-ignore no mesmo evento; negação com "!".
    paths:
      - "Front-End/**"
      - "!Front-End/**/*.md"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

concurrency:
  group: deploy-web
  cancel-in-progress: false

env:
  IMAGE_NAME: doutordigital-web
  STACK_NAME: ddweb
  REMOTE_DIR: /opt/doutordigital/web

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      tag: ${{ github.sha }}
    steps:
      - uses: actions/checkout@v4

      - name: Owner em minúsculas (GHCR exige lowercase)
        id: owner
        run: echo "lc=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: ./Front-End
          push: true
          # Vite "assa" a URL da API em build-time → vem de uma Variable do repo.
          build-args: |
            VITE_API_BASE_URL=${{ vars.VITE_API_BASE_URL }}
          tags: |
            ghcr.io/${{ steps.owner.outputs.lc }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
            ghcr.io/${{ steps.owner.outputs.lc }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build
    # Self-hosted runner na VPS: deploy local, sem inbound SSH (Hostinger dropa
    # IPs de runner hospedado). O build continua no GitHub-hosted acima.
    runs-on: [self-hosted, linux, vps]
    steps:
      - uses: actions/checkout@v4

      - name: Rolling update sem downtime
        env:
          IMAGE_TAG: ${{ needs.build.outputs.tag }}
          GHCR_TOKEN: ${{ secrets.GHCR_PULL_TOKEN }}
          GH_ACTOR: ${{ github.actor }}
        run: |
          set -eu

          cp Front-End/docker-compose.yml ${{ env.REMOTE_DIR }}/docker-compose.yml
          cd ${{ env.REMOTE_DIR }}

          echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GH_ACTOR" --password-stdin

          CI_TAG="$IMAGE_TAG"
          set -a
          . ./.env
          set +a
          IMAGE_TAG="$CI_TAG"
          export IMAGE_TAG

          echo "deploying $IMAGE_TAG"
          docker stack deploy -c docker-compose.yml --with-registry-auth --prune ${{ env.STACK_NAME }}

          SVC=${{ env.STACK_NAME }}_web
          n=0
          while [ "$n" -lt 40 ]; do
            STATE=$(docker service inspect "$SVC" --format '{{if .UpdateStatus}}{{.UpdateStatus.State}}{{else}}completed{{end}}')
            echo "state: $STATE"
            if [ "$STATE" = "completed" ]; then
              echo "rollout OK"
              exit 0
            fi
            case "$STATE" in
              rollback_*|paused)
                echo "rollout FAILED ($STATE) - swarm reverteu"
                docker service ps "$SVC" --no-trunc | head -20
                exit 1
                ;;
            esac
            n=$((n + 1))
            sleep 5
          done
          echo "timeout esperando convergencia"
          docker service ps "$SVC" --no-trunc | head -20
          exit 1

      - name: Smoke test publico
        run: |
          for i in $(seq 1 10); do
            CODE=$(curl -s -o /dev/null -w "%{http_code}" \
              "https://${{ vars.WEB_DOMAIN }}/healthz" --max-time 10 || echo 000)
            [ "$CODE" = "200" ] && { echo "healthz respondeu 200"; exit 0; }
            echo "tentativa $i: HTTP $CODE"; sleep 6
          done
          echo "healthz nao respondeu 200"; exit 1
