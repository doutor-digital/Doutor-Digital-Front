name: deploy-web

# O projeto vive em Front-End/, mas o Actions só lê workflows da raiz do repo.
on:
  push:
    branches: [main]
    # GitHub não aceita paths + paths-ignore no mesmo evento; negação com "!".
    paths:
      - "Front-End/**"
      - "!Front-End/**/*.md"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

concurrency:
  group: deploy-web
  cancel-in-progress: false

env:
  IMAGE_NAME: doutordigital-web
  STACK_NAME: ddweb
  REMOTE_DIR: /opt/doutordigital/web

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      tag: ${{ github.sha }}
    steps:
      - uses: actions/checkout@v4

      - name: Owner em minúsculas (GHCR exige lowercase)
        id: owner
        run: echo "lc=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: ./Front-End
          push: true
          # Vite "assa" a URL da API em build-time → vem de uma Variable do repo.
          build-args: |
            VITE_API_BASE_URL=${{ vars.VITE_API_BASE_URL }}
          tags: |
            ghcr.io/${{ steps.owner.outputs.lc }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
            ghcr.io/${{ steps.owner.outputs.lc }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Copia o docker-compose.yml para a VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: Front-End/docker-compose.yml
          target: ${{ env.REMOTE_DIR }}
          strip_components: 1

      - name: Rolling update sem downtime
        uses: appleboy/ssh-action@v1.2.0
        env:
          IMAGE_TAG: ${{ needs.build.outputs.tag }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: IMAGE_TAG
          script_stop: true
          # Script ASCII puro: acentos/emoji corrompem no transporte do ssh-action.
          script: |
            set -eu
            cd ${{ env.REMOTE_DIR }}

            echo "${{ secrets.GHCR_PULL_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

            # Preserva o IMAGE_TAG do CI (SHA) contra o latest do .env.
            CI_TAG="$IMAGE_TAG"
            set -a
            . ./.env
            set +a
            IMAGE_TAG="$CI_TAG"
            export IMAGE_TAG

            echo "deploying $IMAGE_TAG"
            docker stack deploy -c docker-compose.yml --with-registry-auth --prune ${{ env.STACK_NAME }}

            SVC=${{ env.STACK_NAME }}_web
            n=0
            while [ "$n" -lt 40 ]; do
              STATE=$(docker service inspect "$SVC" --format '{{if .UpdateStatus}}{{.UpdateStatus.State}}{{else}}completed{{end}}')
              echo "state: $STATE"
              if [ "$STATE" = "completed" ]; then
                echo "rollout OK"
                exit 0
              fi
              case "$STATE" in
                rollback_*|paused)
                  echo "rollout FAILED ($STATE) - swarm reverteu"
                  docker service ps "$SVC" --no-trunc | head -20
                  exit 1
                  ;;
              esac
              n=$((n + 1))
              sleep 5
            done
            echo "timeout esperando convergencia"
            docker service ps "$SVC" --no-trunc | head -20
            exit 1

      - name: Smoke test público
        run: |
          for i in $(seq 1 10); do
            CODE=$(curl -s -o /dev/null -w "%{http_code}" \
              "https://${{ vars.WEB_DOMAIN }}/healthz" --max-time 10 || echo 000)
            [ "$CODE" = "200" ] && { echo "✓ /healthz respondeu 200"; exit 0; }
            echo "tentativa $i: HTTP $CODE"; sleep 6
          done
          echo "✗ /healthz não respondeu 200"; exit 1
